name: mimic

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  # Core
  - python=3.12
  - pip

  # PyTorch (GPU-enabled)
  - pytorch=2.7.*
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8

  # Scientific stack
  - numpy=1.26
  - scipy
  - pandas
  - scikit-learn
  - mkl
  - mkl_fft
  - mkl_random

  # Probabilistic / GP
  - gpytorch
  - botorch
  - pyro-ppl
  - linear_operator

  # Training / utilities
  - ignite
  - einops
  - opt_einsum
  - multipledispatch
  - jaxtyping
  - mypy_extensions

  # Hugging Face
  - huggingface_hub
  - accelerate

  # System-safe libs
  - openssl
  - certifi
  - libffi
  - yaml
  - zlib
  - tk
  - xz
  - ncurses

  # Pip-only packages
